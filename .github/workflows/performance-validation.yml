name: Performance Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run performance validation daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  performance-validation:
    name: Performance Validation
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup performance testing environment
        run: |
          # Install additional tools for performance testing
          npm install -g lighthouse puppeteer
          
          # Create test results directory
          mkdir -p test-results/performance
          
      - name: Run TypeScript compilation check
        run: npm run typecheck
        
      - name: Run unit tests
        run: npm run test:unit
        
      - name: Run performance benchmarks
        run: |
          npm run test:performance
          npm run benchmark
          
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Run performance validation
        run: node scripts/performance-validation.js
        env:
          CI: true
          GITHUB_ACTIONS: true
          
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results-${{ matrix.node-version }}
          path: |
            test-results/performance/
            test-results/benchmark-results.json
            test-results/performance-results.json
          retention-days: 30
          
      - name: Publish performance report
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' && matrix.node-version == '20.x'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-results/performance
          destination_dir: performance-reports/${{ github.sha }}
          
      - name: Comment performance results on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x'
        with:
          script: |
            const fs = require('fs');
            const path = './test-results/performance/performance-validation-report.json';
            
            if (fs.existsSync(path)) {
              const report = JSON.parse(fs.readFileSync(path, 'utf8'));
              
              const scoreEmoji = report.summary.score >= 90 ? '🟢' : 
                                report.summary.score >= 70 ? '🟡' : '🔴';
              
              const comment = `## ${scoreEmoji} Performance Validation Report
              
              **Overall Score:** ${report.summary.score}/100
              
              **Test Results:**
              - ✅ Passed: ${report.summary.passed}
              - ❌ Failed: ${report.summary.failed}
              - ⚠️ Warnings: ${report.summary.warnings}
              
              **Key Metrics:**
              ${Object.values(report.tests).map(test => 
                `- ${test.passed ? '✅' : '❌'} ${test.name}: ${test.score ? test.score.toFixed(1) + '/100' : 'N/A'}`
              ).join('\\n')}
              
              📊 [View detailed report](https://your-username.github.io/open-runner/performance-reports/${{ github.sha }}/performance-validation-report.html)
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
            
      - name: Fail if performance thresholds not met
        run: |
          if [ -f test-results/performance/performance-validation-report.json ]; then
            score=$(cat test-results/performance/performance-validation-report.json | jq '.summary.score')
            failed=$(cat test-results/performance/performance-validation-report.json | jq '.summary.failed')
            
            echo "Performance score: $score"
            echo "Failed tests: $failed"
            
            if [ "$failed" -gt 0 ]; then
              echo "❌ Performance validation failed with $failed failing tests"
              exit 1
            fi
            
            if [ "$score" -lt 70 ]; then
              echo "❌ Performance score $score is below minimum threshold of 70"
              exit 1
            fi
            
            echo "✅ Performance validation passed"
          else
            echo "❌ Performance validation report not found"
            exit 1
          fi

  lighthouse-audit:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: performance-validation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Serve application
        run: |
          npm install -g serve
          serve -s dist -l 3000 &
          sleep 5
          
      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  performance-regression-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          
      - name: Install dependencies (base)
        run: npm ci
        
      - name: Run baseline performance test
        run: |
          npm run test:performance
          cp test-results/performance-results.json baseline-performance.json
          
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          
      - name: Install dependencies (PR)
        run: npm ci
        
      - name: Run PR performance test
        run: npm run test:performance
        
      - name: Compare performance
        run: |
          node -e "
          const baseline = require('./baseline-performance.json');
          const current = require('./test-results/performance-results.json');
          
          const baselineFPS = baseline.averageFPS || 60;
          const currentFPS = current.averageFPS || 60;
          const fpsRegression = ((baselineFPS - currentFPS) / baselineFPS) * 100;
          
          const baselineMemory = baseline.memoryUsage || 100;
          const currentMemory = current.memoryUsage || 100;
          const memoryRegression = ((currentMemory - baselineMemory) / baselineMemory) * 100;
          
          console.log('Performance Comparison:');
          console.log('FPS: ' + currentFPS.toFixed(1) + ' (baseline: ' + baselineFPS.toFixed(1) + ')');
          console.log('Memory: ' + currentMemory.toFixed(1) + 'MB (baseline: ' + baselineMemory.toFixed(1) + 'MB)');
          
          if (fpsRegression > 10) {
            console.error('❌ Significant FPS regression detected: ' + fpsRegression.toFixed(1) + '%');
            process.exit(1);
          }
          
          if (memoryRegression > 20) {
            console.error('❌ Significant memory regression detected: ' + memoryRegression.toFixed(1) + '%');
            process.exit(1);
          }
          
          console.log('✅ No significant performance regression detected');
          "

  mobile-performance-test:
    name: Mobile Performance Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
      - name: Build application
        run: npm run build
        
      - name: Run mobile performance tests
        run: npm run test:mobile
        
      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        with:
          name: mobile-performance-results
          path: test-results/mobile-performance.json
          retention-days: 30