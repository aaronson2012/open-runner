<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="High-performance 3D endless runner game with WebGPU acceleration" />
  <meta name="keywords" content="game, threejs, webgpu, endless runner, 3d, mobile" />
  <meta name="author" content="Open Runner Team" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Open Runner" />
  <meta name="mobile-web-app-capable" content="yes" />
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <title>Open Runner - 3D Endless Runner Game</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    
    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    canvas {
      display: block;
      touch-action: none;
    }
    
    /* Loading screen */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease-out;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .loading-progress {
      font-size: 14px;
      opacity: 0.7;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Performance indicator */
    #performance {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      display: none;
    }
    
    .fps-good { color: #4ade80; }
    .fps-warning { color: #fbbf24; }
    .fps-critical { color: #ef4444; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Open Runner...</div>
      <div class="loading-progress" id="loading-progress">Initializing...</div>
    </div>
    
    <div id="performance">
      FPS: <span id="fps">60</span> | 
      MS: <span id="frame-time">16.7</span>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
